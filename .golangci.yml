version: '2'

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofumpt
    - godot
    - misspell
    - noctx
    - bodyclose
    - nilerr

linters-settings:
  gofumpt:
    extra-rules: true
  godot:
    scope: declarations

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
